name: Scrape and Deploy

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Set up git, restore scraped data, create worktree
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # Fetch scraped-data branch if it exists
          git fetch origin scraped-data 2>/dev/null || true

          # Restore scraped data files from scraped-data branch into working dir
          if git rev-parse --verify origin/scraped-data >/dev/null 2>&1; then
            git checkout origin/scraped-data -- scraper/ 2>/dev/null || true
            echo "Restored scraped data from scraped-data branch"
            # Create worktree from existing branch
            git worktree add /tmp/scraped-data scraped-data 2>/dev/null || true
          else
            echo "No scraped-data branch yet, starting fresh"
            # Create orphan branch via worktree
            git worktree add --orphan -b scraped-data /tmp/scraped-data 2>/dev/null || true
            cd /tmp/scraped-data
            git commit --allow-empty -m "init [skip ci]" 2>/dev/null || true
            git push origin scraped-data 2>/dev/null || true
            cd "$GITHUB_WORKSPACE"
          fi

      - name: Quick check for changes (2 requests)
        id: check
        run: |
          if python3 scraper/scrape.py --check-only; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Smart scrape (only changed models)
        id: scrape
        continue-on-error: true
        env:
          GIT_CHECKPOINT: "1"
          GIT_CHECKPOINT_WORKTREE: "/tmp/scraped-data"
        run: python3 scraper/scrape.py --smart --skip-search -v

      - name: Final checkpoint push
        if: always()
        run: |
          if [ -d /tmp/scraped-data ]; then
            cp -r scraper/ /tmp/scraped-data/scraper/
            cd /tmp/scraped-data
            git add -A scraper/
            git commit -m "final $(date -u '+%Y-%m-%d %H:%M:%S UTC') [skip ci]" || true
            git push origin scraped-data || true
            cd "$GITHUB_WORKSPACE"
          fi

      - name: Build site
        if: always()
        run: python3 build.py --base "/${{ github.event.repository.name }}"

      - name: Upload artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4
name: Scrape and Deploy

on:
  schedule:
    # Every 6 hours at minute 0
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Restore catalog hash
        uses: actions/cache@v4
        with:
          path: scraper/.catalog-hash
          key: catalog-hash

      - name: Quick check for changes (1 request)
        id: check
        run: |
          # On push/manual trigger, skip the check and always do a full build.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Forced build (event: ${{ github.event_name }})"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # On schedule: fetch /library?sort=newest, hash card data, compare.
          # Exit 0 = unchanged (skip), 1 = changed (proceed to full scrape).
          if python3 scraper/scrape.py --check-only; then
            echo "No changes — skipping build"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected — proceeding to full scrape"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Full scrape + build
        if: steps.check.outputs.changed == 'true'
        run: |
          python3 scraper/scrape.py --skip-search -v
          python3 build.py --base "/${{ github.event.repository.name }}"

      - name: Upload artifact
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
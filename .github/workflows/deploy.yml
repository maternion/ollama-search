name: Scrape and Deploy

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Restore scraped data cache
        uses: actions/cache@v4
        with:
          path: |
            scraper/.catalog-hash
            scraper/models.json
            scraper/sort_orders.json
            scraper/sort_ranks.json
            scraper/tags/
            scraper/pages/
            scraper/tag_pages/
            scraper/blobs/
          key: scraped-data-${{ github.run_id }}
          restore-keys: |
            scraped-data-

      - name: Quick check for changes (2 requests)
        id: check
        run: |
          # Fetch /search + /library?sort=newest, hash card data, compare to cache.
          # Exit 0 = unchanged, 1 = changed.
          if python3 scraper/scrape.py --check-only; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Smart scrape (only changed models)
        if: steps.check.outputs.changed == 'true'
        run: python3 scraper/scrape.py --smart --skip-search -v

      - name: Build site
        # Always build on push (code may have changed).
        # On schedule, only build if data changed.
        if: steps.check.outputs.changed == 'true' || github.event_name != 'schedule'
        run: python3 build.py --base "/${{ github.event.repository.name }}"

      - name: Upload artifact
        if: steps.check.outputs.changed == 'true' || github.event_name != 'schedule'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.changed == 'true' || github.event_name != 'schedule'
        uses: actions/deploy-pages@v4
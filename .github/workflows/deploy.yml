name: Scrape and Deploy

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Restore scraped data from cache branch
        run: |
          git fetch origin scraped-data || true
          if git rev-parse --verify origin/scraped-data >/dev/null 2>&1; then
            git checkout scraped-data -- scraper/.catalog-hash scraper/models.json scraper/sort_orders.json scraper/sort_ranks.json scraper/tags/ scraper/pages/ scraper/tag_pages/ scraper/blobs/ 2>/dev/null || true
            echo "Restored scraped data from scraped-data branch"
          else
            echo "No scraped-data branch yet, starting fresh"
          fi

      - name: Quick check for changes (2 requests)
        id: check
        run: |
          if python3 scraper/scrape.py --check-only; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Smart scrape (only changed models)
        if: steps.check.outputs.changed == 'true'
        run: python3 scraper/scrape.py --smart --skip-search -v

      - name: Save scraped data to cache branch
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout --orphan scraped-data-tmp
          git add scraper/.catalog-hash scraper/models.json scraper/sort_orders.json scraper/sort_ranks.json scraper/tags/ scraper/pages/ scraper/tag_pages/ scraper/blobs/ 2>/dev/null || true
          git commit -m "Scraped data $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git branch -D scraped-data 2>/dev/null || true
          git branch -M scraped-data
          git push --force origin scraped-data

      - name: Build site
        if: steps.check.outputs.changed == 'true' || github.event_name != 'schedule'
        run: python3 build.py --base "/${{ github.event.repository.name }}"

      - name: Upload artifact
        if: steps.check.outputs.changed == 'true' || github.event_name != 'schedule'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.changed == 'true' || github.event_name != 'schedule'
        uses: actions/deploy-pages@v4
name: Scrape and Deploy

on:
  schedule:
    - cron: "0 */2 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Set up git, restore scraped data, create worktree
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git fetch origin scraped-data 2>/dev/null || true
          if git rev-parse --verify origin/scraped-data >/dev/null 2>&1; then
            # Restore all scraped data from scraped-data branch, then re-overlay
            # code files from main so scraper fixes aren't overwritten by the
            # scraped-data branch's older copy.
            git checkout origin/scraped-data -- scraper/ 2>/dev/null || true
            git checkout origin/main -- scraper/scrape.py 2>/dev/null || true
            git reset HEAD scraper/ 2>/dev/null || true
            echo "Restored scraped data from scraped-data branch"
            git worktree add /tmp/scraped-data scraped-data 2>/dev/null || true
          else
            echo "No scraped-data branch yet, starting fresh"
            git worktree add --orphan -b scraped-data /tmp/scraped-data 2>/dev/null || true
            cd /tmp/scraped-data
            git commit --allow-empty -m "init [skip ci]" 2>/dev/null || true
            git push origin scraped-data 2>/dev/null || true
            cd "$GITHUB_WORKSPACE"
          fi

      # ── Scrape: always run --smart (detects tier changes, tag retirements) ──
      - name: Scrape (2h max)
        id: scrape1
        continue-on-error: true
        env:
          GIT_CHECKPOINT: "1"
          GIT_CHECKPOINT_WORKTREE: "/tmp/scraped-data"
        run: python3 scraper/scrape.py --smart --skip-search --max-runtime 7200 -v

      - name: Checkpoint + build + self-check
        id: build1
        run: |
          # Push checkpoint to scraped-data
          if [ -d /tmp/scraped-data ]; then
            rm -rf /tmp/scraped-data/scraper
            mkdir -p /tmp/scraped-data/scraper
            cp -r scraper/* /tmp/scraped-data/scraper/
            cd /tmp/scraped-data
            git add -A scraper/
            git commit -m "checkpoint $(date -u '+%H:%M:%S UTC') [skip ci]" || true
            git push origin scraped-data || true
            cd "$GITHUB_WORKSPACE"
          fi
          # Build site
          python3 build.py --base "/${{ github.event.repository.name }}"
          # Self-check BEFORE deploy so bad data doesn't go live
          python3 scraper/scrape.py --self-check

      # ── Deploy: upload artifact + deploy-pages (no gh-pages branch needed) ──
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4